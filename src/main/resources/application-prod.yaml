spring:
  application:
    name: ${APP_NAME:tinyurl}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tinyurl}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:20}
      minimum-idle: ${DB_MIN_IDLE:5}
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: none   # ❗ NEVER use update/create in prod
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
        show_sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful

app:
  short-url-base: ${SHORT_URL_BASE:http://localhost:8081}

  id-allocation:
    batch-size: ${ID_BATCH_SIZE:1000}

  cache:
    slug-ttl: ${CACHE_SLUG_TTL:P7D}

  bloom-filter:
    expected-insertions: ${BLOOM_EXPECTED_INSERTIONS:1000000}
    fpp: ${BLOOM_FPP:0.01}
    enabled: ${BLOOM_ENABLED:true}

  zookeeper:
    connect-string: ${ZK_CONNECT_STRING:localhost:2181}
    session-timeout-ms: ${ZK_SESSION_TIMEOUT:60000}
    connection-timeout-ms: ${ZK_CONNECTION_TIMEOUT:15000}
    id-counter-path: ${ZK_ID_COUNTER_PATH:/tinyurl/id-counter}

  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    permits-per-minute: ${RATE_LIMIT_PER_MINUTE:120}

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS:health,info,metrics,prometheus}
  endpoint:
    health:
      show-details: when_authorized
  health:
    redis:
      enabled: true

springdoc:
  api-docs:
    path: ${API_DOCS_PATH:/api-docs}
  swagger-ui:
    path: ${SWAGGER_UI_PATH:/swagger-ui.html}