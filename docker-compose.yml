services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tinyurl
      POSTGRES_USER: tinyurl
      POSTGRES_PASSWORD: tinyurl
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tinyurl -d tinyurl"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: zookeeper:3.9
    ports:
      - "2181:2181"
    environment:
      ZOO_MY_ID: 1
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tinyurl
      SPRING_DATASOURCE_USERNAME: tinyurl
      SPRING_DATASOURCE_PASSWORD: tinyurl
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      APP_ZOOKEEPER_CONNECT_STRING: zookeeper:2181
      APP_SHORT_URL_BASE: http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      zookeeper:
        condition: service_started

volumes:
  pgdata:
